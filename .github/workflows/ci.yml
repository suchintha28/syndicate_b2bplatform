name: CI

on:
  workflow_dispatch: {}   # allows manual trigger via GitHub API
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'components/**'
      - 'lib/**'
      - 'sanity/**'
      - 'types/**'
      - 'tests/**'
      - 'supabase/**'
      - 'package.json'
      - 'package-lock.json'
      - 'playwright.config.ts'
      - 'vitest.config.ts'
      - 'next.config.*'
      - '.github/workflows/**'
  pull_request:
    branches: [main]
    paths:
      - 'app/**'
      - 'components/**'
      - 'lib/**'
      - 'sanity/**'
      - 'types/**'
      - 'tests/**'
      - 'supabase/**'
      - 'package.json'
      - 'package-lock.json'
      - 'playwright.config.ts'
      - 'vitest.config.ts'
      - 'next.config.*'
      - '.github/workflows/**'

jobs:
  # ── Job 1: Unit tests ────────────────────────────────────────────────────────
  unit-tests:
    name: Unit tests (Vitest)
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage
        run: npm run test:unit:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-coverage
          path: coverage/
          retention-days: 14

  # ── Job 2: E2E tests ─────────────────────────────────────────────────────────
  e2e-tests:
    name: E2E tests (Playwright)
    runs-on: ubuntu-latest

    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      NEXT_PUBLIC_SANITY_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_SANITY_PROJECT_ID }}
      NEXT_PUBLIC_SANITY_DATASET: production
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      # ── Seller test account (manages products, brand profile, RFQs) ──────────
      E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
      E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}
      E2E_USER_ROLE: ${{ secrets.E2E_USER_ROLE }}
      # ── Buyer test account (browse, RFQ, message seller) ─────────────────────
      E2E_BUYER_EMAIL: ${{ secrets.E2E_BUYER_EMAIL }}
      E2E_BUYER_PASSWORD: ${{ secrets.E2E_BUYER_PASSWORD }}

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers (Chromium only)
        run: npx playwright install chromium --with-deps

      - name: Build the Next.js app
        run: npm run build

      - name: Select E2E test scope
        # Maps changed files to the relevant spec files so we don't run
        # the full suite for every commit. Falls back to full suite when
        # core infra (middleware, supabase, config) changes.
        run: bash scripts/select-e2e-tests.sh

      - name: Run E2E tests
        # PLAYWRIGHT_SPECS is set by the previous step (e.g. "tests/e2e/marketplace.spec.ts").
        # When it equals "tests/e2e/" the full suite runs; otherwise only the relevant specs.
        # The webServer block in playwright.config.ts starts `npm run start` automatically.
        run: npx playwright test ${{ env.PLAYWRIGHT_SPECS }}

      - name: Upload Playwright report on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  # ── Job 3: Deploy to Vercel ───────────────────────────────────────────────────
  # Only runs on pushes to main (not on pull requests) and only after BOTH
  # unit-tests and e2e-tests pass. Nothing broken ever reaches production.
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: [unit-tests, e2e-tests]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    env:
      VERCEL_TOKEN:                    ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID:                   ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID:               ${{ secrets.VERCEL_PROJECT_ID }}
      NEXT_PUBLIC_SUPABASE_URL:        ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY:   ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      NEXT_PUBLIC_SANITY_PROJECT_ID:   ${{ secrets.NEXT_PUBLIC_SANITY_PROJECT_ID }}
      NEXT_PUBLIC_SANITY_DATASET:      production

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment variables
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build for Vercel
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel (production)
        id: vercel-deploy
        run: |
          DEPLOYMENT_URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "deployment_url=$DEPLOYMENT_URL" >> "$GITHUB_OUTPUT"

      - name: Smoke-test the production deployment
        # Verifies the deployed URL is live before marking the workflow green.
        # Waits up to 60s for the deployment to become available, then checks
        # that the home page returns HTTP 200. No external cron needed.
        run: |
          URL="${{ steps.vercel-deploy.outputs.deployment_url }}"
          if [ -z "$URL" ]; then
            echo "No deployment URL captured — skipping smoke test."
            exit 0
          fi
          echo "Checking $URL …"
          for i in $(seq 1 6); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
            if [ "$STATUS" = "200" ]; then
              echo "✓ Deployment is live (HTTP $STATUS)"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS — retrying in 10s…"
            sleep 10
          done
          echo "✗ Deployment did not return 200 after 60s"
          exit 1
