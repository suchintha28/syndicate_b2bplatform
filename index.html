              <Header title="Edit Product" onBack={() => setScreen('manage-products')} />
              <div className="px-6 py-6">
                <form onSubmit={(e) => { e.preventDefault(); setScreen('manage-products'); }}>
                  
                  {/* Product Name */}
                  <div className="mb-4">
                    <label className="block font-medium mb-2 text-black">Product Name</label>
                    <input 
                      type="text" 
                      defaultValue={editingProduct.name}
                      required 
                      className="w-full px-4 py-3 border-2 border-stone-300 rounded-xl focus:outline-none focus:border-black" 
                    />
                  </div>

                  {/* Product Images */}
                  <div className="mb-4">
                    <label className="block font-medium mb-2 text-black">Product Images</label>
                    <div className="border-2 border-dashed border-stone-300 rounded-xl p-6 text-center">
                      <svg className="w-12 h-12 mx-auto mb-3" viewBox="0 0 24 24" fill="none" stroke="black" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg><div className="text-sm text-stone-600">Upload product images</div>
                      <div className="text-sm text-stone-600">Upload product images</div>
                    </div>
                  </div>

                  {/* Product Video - Pro Only */}
                  <div className="mb-4">
                    <label className="block font-medium mb-2 text-black">Product Video</label>
                    {isProMember ? (
                      <input 
                        type="url" 
                        defaultValue={editingProduct.videoUrl}
                        placeholder="https://youtube.com/..."
                        className="w-full px-4 py-3 border-2 border-stone-300 rounded-xl focus:outline-none focus:border-black" 
                      />
                    ) : (
                      <div className="border-2 border-dashed border-stone-300 rounded-xl p-6 text-center bg-stone-100">
                        <svg className="w-12 h-12 mx-auto mb-3" viewBox="0 0 24 24" fill="none" stroke="black" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                        <div className="text-sm text-stone-600 mb-2">Pro Feature</div>
                        <button 
                          type="button"
                          onClick={() => setScreen('subscription')}
                          className="text-black text-sm font-medium underline hover:no-underline"
                        >
                          Upgrade to unlock
                        </button>
                      </div>
                    )}
                  </div>

                  {/* Description */}
                  <div className="mb-4">
                    <label className="block font-medium mb-2 text-black">Description</label>
                    <textarea 
                      defaultValue="High-quality product with advanced features."
                      required 
                      className="w-full px-4 py-3 border-2 border-stone-300 rounded-xl focus:outline-none focus:border-black min-h-32"
                    ></textarea>
                  </div>

                  {/* Base Price */}
                  <div className="mb-4">
                    <label className="block font-medium mb-2 text-black">Base Price ($)</label>
                    <input 
                      type="number" 
                      defaultValue={editingProduct.price.replace('$', '')}
                      placeholder="299" 
                      required 
                      className="w-full px-4 py-3 border-2 border-stone-300 rounded-xl focus:outline-none focus:border-black" 
                    />
                  </div>

                  {/* Tiered Pricing */}
                  <div className="mb-4">
                    <label className="block font-medium mb-2 text-black">Tiered Pricing</label>
                    <div className="space-y-3">
                      {editingProduct.tieredPricing.map((tier, index) => (
                        <div key={index} className="bg-white rounded-xl p-4 border border-stone-200">
                          <div className="grid grid-cols-3 gap-2 mb-2">
                            <div>
                              <label className="block text-xs text-stone-600 mb-1">Min Qty</label>
                              <input 
                                type="number" 
                                defaultValue={tier.min}
                                className="w-full px-3 py-2 border border-stone-300 rounded-lg text-sm"
                              />
                            </div>
                            <div>
                              <label className="block text-xs text-stone-600 mb-1">Max Qty</label>
                              <input 
                                type="number" 
                                defaultValue={tier.max || ''}
                                placeholder="∞"
                                className="w-full px-3 py-2 border border-stone-300 rounded-lg text-sm"
                              />
                            </div>
                            <div>
                              <label className="block text-xs text-stone-600 mb-1">Price ($)</label>
                              <input 
                                type="number" 
                                defaultValue={tier.price}
                                className="w-full px-3 py-2 border border-stone-300 rounded-lg text-sm"
                              />
                            </div>
                          </div>
                          {index > 0 && (
                            <button 
                              type="button"
                              className="text-red-600 text-xs hover:underline"
                            >
                              Remove tier
                            </button>
                          )}
                        </div>
                      ))}
                      <button 
                        type="button"
                        className="w-full bg-stone-100 text-black py-2 rounded-lg text-sm font-medium hover:bg-stone-200"
                      >
                        + Add Price Tier
                      </button>
                    </div>
                  </div>

                  {/* Product Variations */}
                  <div className="mb-4">
                    <label className="block font-medium mb-2 text-black">Product Variations</label>
                    <div className="space-y-3">
                      {editingProduct.variations.map((variation, index) => (
                        <div key={index} className="bg-white rounded-xl p-4 border border-stone-200">
                          <div className="grid grid-cols-2 gap-2 mb-2">
                            <div>
                              <label className="block text-xs text-stone-600 mb-1">Name</label>
                              <input 
                                type="text" 
                                defaultValue={variation.name}
                                placeholder="e.g., Standard, Advanced"
                                className="w-full px-3 py-2 border border-stone-300 rounded-lg text-sm"
                              />
                            </div>
                            <div>
                              <label className="block text-xs text-stone-600 mb-1">Price ($)</label>
                              <input 
                                type="number" 
                                defaultValue={variation.price}
                                className="w-full px-3 py-2 border border-stone-300 rounded-lg text-sm"
                              />
                            </div>
                          </div>
                          <button 
                            type="button"
                            className="text-red-600 text-xs hover:underline"
                          >
                            Remove variation
                          </button>
                        </div>
                      ))}
                      <button 
                        type="button"
                        className="w-full bg-stone-100 text-black py-2 rounded-lg text-sm font-medium hover:bg-stone-200"
                      >
                        + Add Variation
                      </button>
                    </div>
                  </div>

                  {/* Direct Sales - Pro Only */}
                  <div className="mb-6">
                    <label className="block font-medium mb-2 text-black">Sell Directly on Marketplace</label>
                    {isProMember ? (
                      <div className="bg-white rounded-xl p-4 border border-stone-200">
                        <label className="flex items-center gap-3 cursor-pointer">
                          <input 
                            type="checkbox"
                            defaultChecked={editingProduct.directSales}
                            className="w-5 h-5 rounded"
                          />
                          <div>
                            <div className="font-medium text-black">Enable Direct Sales</div>
                            <div className="text-xs text-stone-500">Allow buyers to purchase directly through the marketplace</div>
                          </div>
                        </label>
                      </div>
                    ) : (
                      <div className="border-2 border-dashed border-stone-300 rounded-xl p-6 text-center bg-stone-100">
                        <svg className="w-12 h-12 mx-auto mb-3" viewBox="0 0 24 24" fill="none" stroke="black" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                        <div className="text-sm text-stone-600 mb-2">Pro Feature</div>
                        <button 
                          type="button"
                          onClick={() => setScreen('subscription')}
                          className="text-black text-sm font-medium underline hover:no-underline"
                        >
                          Upgrade to unlock
                        </button>
                      </div>
                    )}
                  </div>

                  <button type="submit" className="w-full bg-black text-white py-3 rounded-xl font-semibold hover:bg-stone-800">
                    Save Changes
                  </button>
                </form>
              </div>
            </div>
          )}

          {/* APP SETTINGS SCREEN */}
          {screen === 'settings' && (
            <div className="bg-stone-50">
              <Header title="App Settings" onBack={() => setScreen('profile')} />
              <div className="px-6 py-6">
                <div className="space-y-3 mb-6">
                  {[
                    { label: 'Notifications', screen: null },
                    { label: 'Privacy & Security', screen: null },
                    { label: 'Language', screen: null },
                    { label: 'Dark Mode', screen: null },
                    { label: 'Help & Support', screen: null },
                    { label: 'Terms of Service', screen: null },
                    { label: 'About', screen: null }
                  ].map((item, i) => (
                    <div 
                      key={i}
                      onClick={() => item.screen && setScreen(item.screen)}
                      className="bg-white rounded-xl p-4 border border-stone-200 cursor-pointer hover:shadow-md transition-shadow"
                    >
                      <div className="flex items-center justify-between">
                        <span className="font-medium text-black">{item.label}</span>
                        <span className="text-stone-400">→</span>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          )}

          {/* MANAGE PROFILE SCREEN */}
          {screen === 'manage-profile' && (
            <div className="bg-stone-50">
              <Header title="Manage Profile" onBack={() => setScreen('profile')} />
              <div className="px-6 py-6">
                <form onSubmit={(e) => { e.preventDefault(); setScreen('profile'); }}>
                  
                  {/* Profile Banner - Pro Only */}
                  <div className="mb-6">
                    <label className="block font-medium mb-2 text-black">Profile Banner</label>
                    {isProMember ? (
                      <div>
                        <div 
                          className="w-full h-32 rounded-xl mb-2 flex items-center justify-center text-white text-sm"
                          style={{ backgroundColor: userProfile.bannerColor }}
                        >
                          Banner Preview
                        </div>
                        <input 
                          type="color" 
                          value={userProfile.bannerColor}
                          onChange={(e) => setUserProfile({...userProfile, bannerColor: e.target.value})}
                          className="w-full h-10 rounded-lg cursor-pointer" 
                        />
                      </div>
                    ) : (
                      <div className="border-2 border-dashed border-stone-300 rounded-xl p-8 text-center bg-stone-100">
                        <svg className="w-12 h-12 mx-auto mb-3" viewBox="0 0 24 24" fill="none" stroke="black" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                        <div className="text-sm text-stone-600 mb-2">Pro Feature</div>
                        <button 
                          type="button"
                          onClick={() => setScreen('subscription')}
                          className="text-black text-sm font-medium underline hover:no-underline"
                        >
                          Upgrade to unlock
                        </button>
                      </div>
                    )}
                  </div>

                  {/* Business Logo */}
                  <div className="mb-4">
                    <label className="block font-medium mb-2 text-black">Business Logo</label>
                    <div className="flex items-center gap-4">
                      <div className="w-20 h-20 bg-stone-800 rounded-2xl flex items-center justify-center text-white text-2xl font-bold">
                        {userProfile.logo}
                      </div>
                      <div className="flex-1">
                        <input 
                          type="text" 
                          value={userProfile.logo}
                          onChange={(e) => setUserProfile({...userProfile, logo: e.target.value.slice(0, 2).toUpperCase()})}
                          maxLength="2"
                          placeholder="MB"
                          className="w-full px-4 py-3 border-2 border-stone-300 rounded-xl focus:outline-none focus:border-black" 
                        />
                        <div className="text-xs text-stone-500 mt-1">Enter 2 letters for your logo</div>
                      </div>
                    </div>
                  </div>

                  {/* Business Name */}
                  <div className="mb-4">
                    <label className="block font-medium mb-2 text-black">Business Name</label>
                    <input 
                      type="text" 
                      value={userProfile.businessName}
                      onChange={(e) => setUserProfile({...userProfile, businessName: e.target.value})}
                      required 
                      className="w-full px-4 py-3 border-2 border-stone-300 rounded-xl focus:outline-none focus:border-black" 
                    />
                  </div>

                  {/* Category */}
                  <div className="mb-4">
                    <label className="block font-medium mb-2 text-black">Category</label>
                    <select 
                      value={userProfile.category}
                      onChange={(e) => setUserProfile({...userProfile, category: e.target.value})}
                      className="w-full px-4 py-3 border-2 border-stone-300 rounded-xl focus:outline-none focus:border-black"
                    >
                      {CATEGORIES.map(cat => (
                        <option key={cat}>{cat}</option>
                      ))}
                    </select>
                  </div>

                  {/* Email */}
                  <div className="mb-4">
                    <label className="block font-medium mb-2 text-black">Email</label>
                    <input 
                      type="email" 
                      value={userProfile.email}
                      onChange={(e) => setUserProfile({...userProfile, email: e.target.value})}
                      required 
                      className="w-full px-4 py-3 border-2 border-stone-300 rounded-xl focus:outline-none focus:border-black" 
                    />
                  </div>

                  {/* Phone */}
                  <div className="mb-4">
                    <label className="block font-medium mb-2 text-black">Phone</label>
                    <input 
                      type="tel" 
                      value={userProfile.phone}
                      onChange={(e) => setUserProfile({...userProfile, phone: e.target.value})}
                      required 
                      className="w-full px-4 py-3 border-2 border-stone-300 rounded-xl focus:outline-none focus:border-black" 
                    />
                  </div>

                  {/* Website */}
                  <div className="mb-4">
                    <label className="block font-medium mb-2 text-black">Website</label>
                    <input 
                      type="text" 
                      value={userProfile.website}
                      onChange={(e) => setUserProfile({...userProfile, website: e.target.value})}
                      placeholder="www.example.com"
                      className="w-full px-4 py-3 border-2 border-stone-300 rounded-xl focus:outline-none focus:border-black" 
                    />
                  </div>

                  {/* Description */}
                  <div className="mb-4">
                    <label className="block font-medium mb-2 text-black">Business Description</label>
                    <textarea 
                      value={userProfile.description}
                      onChange={(e) => setUserProfile({...userProfile, description: e.target.value})}
                      required 
                      className="w-full px-4 py-3 border-2 border-stone-300 rounded-xl focus:outline-none focus:border-black min-h-32"
                    ></textarea>
                  </div>

                  {/* Custom Pages - Pro Only */}
                  <div className="mb-6">
                    <label className="block font-medium mb-2 text-black">Custom Pages</label>
                    {isProMember ? (
                      <div className="space-y-3">
                        <div className="bg-white rounded-xl p-4 border border-stone-200">
                          <div className="flex items-center justify-between">
                            <span className="text-sm font-medium text-black">About Us</span>
                            <button type="button" className="text-black text-sm hover:underline">Edit</button>
                          </div>
                        </div>
                        <button 
                          type="button"
                          className="w-full bg-stone-100 text-black py-3 rounded-xl font-medium hover:bg-stone-200"
                        >
                          + Add Custom Page
                        </button>
                      </div>
                    ) : (
                      <div className="border-2 border-dashed border-stone-300 rounded-xl p-8 text-center bg-stone-100">
                        <svg className="w-12 h-12 mx-auto mb-3" viewBox="0 0 24 24" fill="none" stroke="black" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                        <div className="text-sm text-stone-600 mb-2">Pro Feature</div>
                        <button 
                          type="button"
                          onClick={() => setScreen('subscription')}
                          className="text-black text-sm font-medium underline hover:no-underline"
                        >
                          Upgrade to unlock
                        </button>
                      </div>
                    )}
                  </div>

                  <button type="submit" className="w-full bg-black text-white py-3 rounded-xl font-semibold hover:bg-stone-800">
                    Save Changes
                  </button>
                </form>
              </div>
            </div>
          )}

          {/* SUBSCRIPTION SCREEN */}
          {screen === 'subscription' && (
            <div className="bg-stone-50">
              <Header title="Upgrade" onBack={() => setScreen('profile')} />
              <div className="px-6 py-6">
                {[
                  { name: 'Free Plan', price: '$0', features: ['Business profile', 'Up to 10 products', 'Mini website', 'Email inquiries'], current: true },
                  { name: 'Monthly Pro', price: '$99', features: ['Everything in Free', 'Unlimited products', 'RFQ access', 'Analytics'], current: false },
                  { name: 'Annual Pro', price: '$79', features: ['Everything in Monthly Pro', 'Featured listings', 'Premium ads', 'API access'], recommended: true, current: false }
                ].map((plan, i) => (
                  <div key={i} className={`bg-white rounded-2xl p-6 mb-4 relative ${plan.recommended ? 'border-2 border-black' : 'border-2 border-stone-200'}`}>
                    {plan.recommended && (
                      <div className="absolute -top-3 right-5 bg-black text-white px-3 py-1 rounded-full text-xs font-semibold">
                        Best Value
                      </div>
                    )}
                    <h3 className="text-xl font-bold text-black mb-2">{plan.name}</h3>
                    <div className="text-3xl font-bold text-black mb-4">
                      {plan.price}<span className="text-base font-normal text-stone-500">/month</span>
                    </div>
                    <ul className="space-y-2 mb-5">
                      {plan.features.map((f, j) => (
                        <li key={j} className="flex items-start gap-2 text-sm text-black">
                          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="black" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="flex-shrink-0 mt-0.5">
                            <polyline points="20 6 9 17 4 12"></polyline>
                          </svg>
                          <span>{f}</span>
                        </li>
                      ))}
                    </ul>
                    <button 
                      onClick={() => {
                        if (!plan.current) {
                          if (plan.name !== 'Free Plan') {
                            setIsProMember(true);
                          }
                          setScreen('success');
                        }
                      }}
                      className={`w-full py-3 rounded-xl font-semibold ${
                        plan.current 
                          ? 'border-2 border-black text-black' 
                          : 'bg-black text-white hover:bg-stone-800'
                      }`}
                    >
                      {plan.current ? 'Current Plan' : 'Upgrade Now'}
                    </button>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* SUCCESS SCREEN */}
          {screen === 'success' && (
            <div className="min-h-full flex items-center justify-center px-6 bg-stone-50">
              <div className="text-center">
                <div className="w-16 h-16 rounded-full border-4 border-black flex items-center justify-center mx-auto mb-6"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg></div>
                <h2 className="text-2xl font-bold text-black mb-3">Success!</h2>
                <p className="text-stone-600 mb-8">Your request has been submitted.</p>
                <button 
                  onClick={() => setScreen('home')}
                  className="bg-black text-white px-8 py-3 rounded-xl font-semibold hover:bg-stone-800"
                >
                  Back to Home
                </button>
              </div>
            </div>
          )}
        </div>

        {/* Fixed Bottom Nav - stays at bottom */}
        <div className="bg-white border-t border-stone-300 flex-shrink-0">
          <div className="flex justify-around py-3">
            {[
              { 
                id: 'home', 
                icon: (active) => (
                  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke={active ? "black" : "#a8a29e"} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                  </svg>
                ), 
                label: 'Home' 
              },
              { 
                id: 'listing', 
                icon: (active) => (
                  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke={active ? "black" : "#a8a29e"} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <path d="m21 21-4.35-4.35"></path>
                  </svg>
                ), 
                label: 'Explore' 
              },
              { 
                id: 'rfqs', 
                icon: (active) => (
                  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke={active ? "black" : "#a8a29e"} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                    <line x1="16" y1="13" x2="8" y2="13"></line>
                    <line x1="16" y1="17" x2="8" y2="17"></line>
                    <polyline points="10 9 9 9 8 9"></polyline>
                  </svg>
                ), 
                label: 'RFQs' 
              },
              { 
                id: 'messages', 
                icon: (active) => (
                  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke={active ? "black" : "#a8a29e"} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                  </svg>
                ), 
                label: 'Messages', 
                badge: unreadCount 
              },
              { 
                id: 'profile', 
                icon: (active) => (
                  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke={active ? "black" : "#a8a29e"} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                  </svg>
                ), 
                label: 'Profile' 
              }
            ].map(nav => (
              <button
                key={nav.id}
                onClick={() => setScreen(nav.id)}
                className={`flex flex-col items-center gap-1 px-3 py-2 relative`}
              >
                <div className="relative">
                  {nav.icon(screen === nav.id)}
                  {nav.badge > 0 && (
                    <span className="absolute -top-1 -right-1 bg-red-500 text-white text-xs w-4 h-4 rounded-full flex items-center justify-center font-bold">
                      {nav.badge}
                    </span>
                  )}
                </div>
                <div className={`text-xs font-medium ${screen === nav.id ? 'text-black' : 'text-stone-400'}`}>{nav.label}</div>
              </button>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}


// Root render
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<SyndicateMarketplace />);
  </script>
</body>
</html>
