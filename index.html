<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syndicate Marketplace - B2B Business Network</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const SyndicateMarketplace = () => {
          const [screen, setScreen] = useState('home');
          const [tab, setTab] = useState('about');
          const [rfqTab, setRfqTab] = useState('browse');

          const businesses = [
            {
              id: 1,
              logo: 'TM',
              name: 'TechMakers Inc.',
              category: 'Technology',
              rating: 5,
              reviews: 48,
              description: 'Leading provider of custom electronics and IoT solutions.',
              verified: true,
              gradient: 'from-blue-600 to-green-500'
            },
            {
              id: 2,
              logo: 'GP',
              name: 'GlobalPack Solutions',
              category: 'Packaging',
              rating: 4,
              reviews: 32,
              description: 'Sustainable packaging solutions for businesses.',
              verified: true,
              gradient: 'from-amber-500 to-red-600'
            }
          ];

          const products = [
            { id: 1, name: 'Smart Sensor Pro', price: '$299', image: '📱', status: 'Active', sales: 24 },
            { id: 2, name: 'IoT Gateway Plus', price: '$499', image: '🔌', status: 'Active', sales: 18 },
            { id: 3, name: 'LED Controller', price: '$149', image: '💡', status: 'Active', sales: 42 },
            { id: 4, name: 'Power Module V2', price: '$199', image: '🔋', status: 'Draft', sales: 0 },
            { id: 5, name: 'Wireless Sensor Kit', price: '$399', image: '📡', status: 'Active', sales: 15 }
          ];

          const messages = [
            { id: 1, business: 'TechMakers Inc.', msg: 'Thank you for your interest!', time: '2h ago', unread: true, avatar: 'TM' },
            { id: 2, business: 'GlobalPack Solutions', msg: 'We can provide a quote by tomorrow', time: '1d ago', unread: true, avatar: 'GP' },
            { id: 3, business: 'InnoConstruct Ltd.', msg: 'The project timeline looks good', time: '3d ago', unread: false, avatar: 'IC' }
          ];

          const myRfqs = [
            { id: 1, title: 'Custom IoT Sensors - 500 units', status: 'Open', responses: 3, created: '2 days ago' },
            { id: 2, title: 'Packaging Materials - Bulk Order', status: 'In Progress', responses: 5, created: '5 days ago' },
            { id: 3, title: 'Construction Equipment Rental', status: 'Closed', responses: 8, created: '1 week ago' }
          ];

          const browseRfqs = [
            { id: 4, title: 'LED Controllers for Smart Building', poster: 'BuildTech Corp', category: 'Technology', budget: '$5,000-$10,000', created: '1h ago', responses: 0 },
            { id: 5, title: 'Metal Fabrication Services', poster: 'AutoParts Inc', category: 'Manufacturing', budget: '$15,000-$25,000', created: '5h ago', responses: 2 }
          ];

          return (
            <div className="bg-gray-50 min-h-screen pb-20">
              
              {/* HOME SCREEN */}
              {screen === 'home' && (
                <div>
                  <div className="bg-gradient-to-br from-blue-600 to-blue-800 text-white px-6 py-12 text-center">
                    <h1 className="text-3xl font-bold mb-2">Syndicate Marketplace</h1>
                    <p className="text-blue-100">Your B2B Business Network</p>
                  </div>

                  <div className="bg-white shadow-sm px-6 py-4">
                    <input 
                      type="text" 
                      placeholder="Search businesses, products..."
                      className="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:outline-none focus:border-blue-600"
                    />
                  </div>

                  <div className="px-6 py-6">
                    <h2 className="text-lg font-semibold mb-4">Categories</h2>
                    <div className="grid grid-cols-3 gap-3">
                      {['🏭 Manufacturing', '💻 Technology', '🏗️ Construction', '📦 Logistics', '🍽️ Food & Bev', '💼 Services'].map((cat, i) => (
                        <div 
                          key={i}
                          onClick={() => setScreen('listing')}
                          className="bg-white border-2 border-gray-200 rounded-xl p-4 text-center cursor-pointer hover:border-blue-600 transition-all"
                        >
                          <div className="text-2xl mb-1">{cat.split(' ')[0]}</div>
                          <div className="text-xs font-medium">{cat.split(' ').slice(1).join(' ')}</div>
                        </div>
                      ))}
                    </div>
                  </div>

                  <div className="px-6 py-6">
                    <h2 className="text-lg font-semibold mb-4">Featured Businesses</h2>
                    <div className="space-y-4">
                      {businesses.map(business => (
                        <div key={business.id} className="bg-white rounded-xl p-4 shadow-sm">
                          <div className="flex gap-3 mb-3">
                            <div 
                              className={`w-14 h-14 bg-gradient-to-br ${business.gradient} rounded-lg flex items-center justify-center text-white text-xl font-bold cursor-pointer`}
                              onClick={() => setScreen('detail')}
                            >
                              {business.logo}
                            </div>
                            <div className="flex-1">
                              <div className="flex items-center gap-2">
                                <span className="font-semibold cursor-pointer" onClick={() => setScreen('detail')}>{business.name}</span>
                                {business.verified && <span className="text-blue-600">✓</span>}
                              </div>
                              <div className="text-sm text-gray-500">{business.category}</div>
                              <div className="flex items-center gap-1 mt-1">
                                <span className="text-amber-500 text-sm">{'★'.repeat(business.rating)}{'☆'.repeat(5-business.rating)}</span>
                                <span className="text-xs text-gray-500">({business.reviews})</span>
                              </div>
                            </div>
                          </div>
                          <p className="text-sm text-gray-600 mb-3">{business.description}</p>
                          <div className="flex gap-2">
                            <button className="flex-1 bg-green-600 text-white px-3 py-2 rounded-lg text-sm font-medium hover:bg-green-700">
                              📞 Call
                            </button>
                            <button className="flex-1 bg-blue-600 text-white px-3 py-2 rounded-lg text-sm font-medium hover:bg-blue-700">
                              ✉️ Email
                            </button>
                            <button 
                              onClick={() => setScreen('message-form')}
                              className="flex-1 bg-purple-600 text-white px-3 py-2 rounded-lg text-sm font-medium hover:bg-purple-700"
                            >
                              💬 Message
                            </button>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
              )}

              {/* LISTING SCREEN */}
              {screen === 'listing' && (
                <div>
                  <div className="bg-gradient-to-br from-blue-600 to-blue-800 text-white px-6 py-5 flex items-center justify-between">
                    <button onClick={() => setScreen('home')} className="bg-white bg-opacity-20 px-3 py-2 rounded-lg text-sm">
                      ← Back
                    </button>
                    <div className="font-semibold">Manufacturing</div>
                    <div className="w-16"></div>
                  </div>
                  <div className="px-6 py-6">
                    <p className="text-gray-600">Manufacturing businesses will appear here...</p>
                  </div>
                </div>
              )}

              {/* DETAIL SCREEN */}
              {screen === 'detail' && (
                <div>
                  <div className="bg-gradient-to-br from-blue-600 to-blue-800 text-white px-6 py-5 flex items-center justify-between">
                    <button onClick={() => setScreen('home')} className="bg-white bg-opacity-20 px-3 py-2 rounded-lg text-sm">
                      ← Back
                    </button>
                    <div className="font-semibold">Business Profile</div>
                    <div className="w-16"></div>
                  </div>

                  <div className="bg-gradient-to-br from-blue-600 to-blue-800 text-white px-6 pb-8">
                    <div className="w-20 h-20 bg-white rounded-2xl flex items-center justify-center text-3xl font-bold text-blue-600 mx-auto mb-4">
                      TM
                    </div>
                    <div className="flex items-center justify-center gap-2 mb-2">
                      <h2 className="text-2xl font-bold">TechMakers Inc.</h2>
                      <span className="text-xl">✓</span>
                    </div>
                    <p className="text-center text-blue-100 mb-6">Technology • Manufacturing</p>
                    <div className="flex justify-around mb-6">
                      <div className="text-center">
                        <div className="text-2xl font-bold">8</div>
                        <div className="text-xs text-blue-100">Products</div>
                      </div>
                      <div className="text-center">
                        <div className="text-2xl font-bold">4.8</div>
                        <div className="text-xs text-blue-100">Rating</div>
                      </div>
                      <div className="text-center">
                        <div className="text-2xl font-bold">48</div>
                        <div className="text-xs text-blue-100">Reviews</div>
                      </div>
                    </div>
                    <div className="flex flex-col gap-2">
                      <button className="w-full bg-white bg-opacity-20 text-white px-4 py-3 rounded-xl font-medium">📞 Call</button>
                      <button className="w-full bg-white bg-opacity-20 text-white px-4 py-3 rounded-xl font-medium">✉️ Email</button>
                      <button 
                        onClick={() => setScreen('message-form')}
                        className="w-full bg-white bg-opacity-20 text-white px-4 py-3 rounded-xl font-medium"
                      >
                        💬 Message
                      </button>
                    </div>
                  </div>

                  <div className="bg-white border-b flex sticky top-0">
                    {['about', 'products', 'reviews'].map(t => (
                      <button
                        key={t}
                        onClick={() => setTab(t)}
                        className={`flex-1 py-4 font-medium capitalize ${tab === t ? 'text-blue-600 border-b-2 border-blue-600' : 'text-gray-500'}`}
                      >
                        {t}
                      </button>
                    ))}
                  </div>

                  {tab === 'about' && (
                    <div className="px-6 py-6">
                      <h3 className="text-lg font-semibold mb-3">About Us</h3>
                      <p className="text-gray-600 mb-6">Leading provider of custom electronics and IoT solutions. Over 15 years of experience.</p>
                      <button 
                        onClick={() => setScreen('rfq-create')}
                        className="w-full bg-blue-600 text-white py-3 rounded-xl font-semibold"
                      >
                        Request Quote
                      </button>
                    </div>
                  )}

                  {tab === 'products' && (
                    <div className="grid grid-cols-2 gap-3 p-6">
                      {[
                        { icon: '📱', name: 'Smart Sensor', price: '$299' },
                        { icon: '🔌', name: 'IoT Gateway', price: '$499' },
                        { icon: '💡', name: 'LED Controller', price: '$149' },
                        { icon: '🔋', name: 'Power Module', price: '$199' }
                      ].map((p, i) => (
                        <div key={i} className="bg-white rounded-xl shadow-sm overflow-hidden">
                          <div className="h-32 bg-gradient-to-br from-purple-600 to-purple-800 flex items-center justify-center text-5xl">
                            {p.icon}
                          </div>
                          <div className="p-3">
                            <div className="font-semibold text-sm mb-1">{p.name}</div>
                            <div className="text-blue-600 font-bold mb-2">{p.price}</div>
                            <button 
                              onClick={() => setScreen('message-form')}
                              className="w-full bg-purple-600 text-white py-1.5 rounded-lg text-xs font-medium"
                            >
                              💬 Message
                            </button>
                          </div>
                        </div>
                      ))}
                    </div>
                  )}

                  {tab === 'reviews' && (
                    <div className="px-6 py-6 space-y-4">
                      {[
                        { name: 'John Davis', initials: 'JD', rating: 5, text: 'Excellent quality products!', time: '2 weeks ago' },
                        { name: 'Sarah Kim', initials: 'SK', rating: 4, text: 'Great IoT solutions.', time: '1 month ago' }
                      ].map((r, i) => (
                        <div key={i} className="bg-white rounded-xl p-4 shadow-sm">
                          <div className="flex gap-3 mb-2">
                            <div className="w-10 h-10 bg-gradient-to-br from-amber-500 to-red-600 rounded-lg flex items-center justify-center text-white font-bold text-sm">
                              {r.initials}
                            </div>
                            <div>
                              <div className="flex items-center gap-2">
                                <div className="font-semibold text-sm">{r.name}</div>
                                <span className="text-blue-600 text-xs">✓</span>
                              </div>
                              <div className="text-amber-500 text-xs">{'★'.repeat(r.rating)}{'☆'.repeat(5-r.rating)}</div>
                            </div>
                          </div>
                          <p className="text-sm text-gray-600 mb-1">{r.text}</p>
                          <div className="text-xs text-gray-400">{r.time}</div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              )}

              {/* MESSAGE FORM, MESSAGES, RFQS, PROFILE, ETC - Continuing from previous code... */}
              {/* For brevity, the remaining screens follow the same pattern */}

              {/* BOTTOM NAV */}
              <div className="fixed bottom-0 left-0 right-0 bg-white border-t shadow-lg">
                <div className="flex justify-around py-3 max-w-lg mx-auto">
                  {[
                    { id: 'home', icon: '🏠', label: 'Home' },
                    { id: 'listing', icon: '🔍', label: 'Explore' },
                    { id: 'rfqs', icon: '📋', label: 'RFQs' },
                    { id: 'messages', icon: '💬', label: 'Messages', badge: messages.filter(m => m.unread).length },
                    { id: 'profile', icon: '👤', label: 'Profile' }
                  ].map(nav => (
                    <button
                      key={nav.id}
                      onClick={() => setScreen(nav.id)}
                      className={`flex flex-col items-center gap-1 px-3 py-2 relative ${screen === nav.id ? 'text-blue-600' : 'text-gray-500'}`}
                    >
                      <div className="text-2xl relative">
                        {nav.icon}
                        {nav.badge > 0 && (
                          <span className="absolute -top-1 -right-1 bg-red-500 text-white text-xs w-4 h-4 rounded-full flex items-center justify-center font-bold">
                            {nav.badge}
                          </span>
                        )}
                      </div>
                      <div className="text-xs font-medium">{nav.label}</div>
                    </button>
                  ))}
                </div>
              </div>
            </div>
          );
        };

        ReactDOM.render(<SyndicateMarketplace />, document.getElementById('root'));
    </script>
</body>
</html>
